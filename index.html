<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업무 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 520px;
      padding: 32px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    #taskInput {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }

    #taskInput:focus {
      border-color: #4f6ef7;
    }

    #taskInput::placeholder {
      color: #aaa;
    }

    #addBtn {
      padding: 10px 18px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #addBtn:hover {
      background: #3a57e8;
    }

    #addBtn:active {
      transform: scale(0.97);
    }

    .stats {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
    }

    .stats span {
      color: #4f6ef7;
      font-weight: 600;
    }

    #taskList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid #eef0f4;
      border-radius: 8px;
      background: #fafafa;
      transition: border-color 0.2s, background 0.2s;
    }

    .task-item:hover {
      border-color: #d0d5e8;
      background: #f5f7ff;
    }

    .task-item.done {
      background: #f9f9f9;
      border-color: #e8e8e8;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      accent-color: #4f6ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 14px;
      color: #2d2d2d;
      line-height: 1.4;
      word-break: break-all;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e74c3c;
      background: #ffeaea;
    }

    .empty-msg {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>업무 리스트</h1>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="새 업무를 입력하세요..." maxlength="200">
      <button id="addBtn">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="taskList"></ul>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const stats = document.getElementById('stats');

    let tasks = [];

    function loadTasks() {
      try {
        const saved = localStorage.getItem('tasks');
        tasks = saved ? JSON.parse(saved) : [];
      } catch {
        tasks = [];
      }
    }

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderTasks() {
      taskList.innerHTML = '';

      if (tasks.length === 0) {
        taskList.innerHTML = '<p class="empty-msg">등록된 업무가 없습니다.</p>';
        stats.innerHTML = '';
        return;
      }

      const doneCount = tasks.filter(t => t.done).length;
      stats.innerHTML = `총 <span>${tasks.length}</span>개 &nbsp;·&nbsp; 완료 <span>${doneCount}</span>개`;

      tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'task-checkbox';
        checkbox.checked = task.done;
        checkbox.addEventListener('change', () => toggleTask(task.id));

        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '&times;';
        delBtn.title = '삭제';
        delBtn.addEventListener('click', () => deleteTask(task.id));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        taskList.appendChild(li);
      });
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) {
        taskInput.focus();
        return;
      }
      tasks.push({ id: Date.now(), text, done: false });
      saveTasks();
      renderTasks();
      taskInput.value = '';
      taskInput.focus();
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.done = !task.done;
        saveTasks();
        renderTasks();
      }
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
    renderTasks();
  </script>
</body>
</html>
